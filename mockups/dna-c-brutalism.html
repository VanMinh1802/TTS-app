<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option C - Neo Brutalism</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #ffd800; color: #000; }
        .brut-card { background: #fff; border: 4px solid #000; border-radius: 16px; box-shadow: 8px 8px 0px #000; }
        .brut-btn { background: #ff4d4d; color: #000; border: 3px solid #000; border-radius: 8px; font-weight: bold; box-shadow: 4px 4px 0px #000; transition: 0.1s; }
        .brut-btn:active { box-shadow: 0px 0px 0px #000; transform: translate(4px, 4px); }
        .brut-badge { background: #00e676; border: 2px solid #000; padding: 2px 8px; border-radius: 20px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body class="min-h-screen p-8 flex items-center justify-center">
    <div class="w-full max-w-xl brut-card p-10">
        <div class="flex items-center space-x-4 mb-8">
            <h1 class="text-4xl font-bold uppercase tracking-tighter">GenVoice</h1>
            <span class="brut-badge shadow-[2px_2px_0px_#000]">PRO</span>
        </div>
        
        <p class="text-lg font-medium mb-8 leading-relaxed">
            API Keys & Quota Management!<br>
            Design that screams personality.
        </p>
        
        <div class="bg-[#e0f7fa] border-4 border-black p-6 rounded-xl shadow-[4px_4px_0px_#000] mb-8">
            <h3 class="text-xl font-bold mb-2">QUOTA REMAINING</h3>
            <p class="text-5xl font-extrabold tracking-tighter">1.2M <span class="text-lg font-medium">chars</span></p>
        </div>
        
        <div class="flex gap-4">
            <button class="brut-btn flex-1 py-4 text-lg">Generate Key</button>
            <button class="brut-btn flex-1 py-4 text-lg" style="background:#fff;">Settings</button>
        </div>

        <div class="mt-6 flex items-center justify-center gap-2">
            <span class="bg-[#00e676] border-2 border-black px-3 py-1 font-bold text-sm shadow-[2px_2px_0_#000]">✓ APPROVED</span>
        </div>
    </div>
</body>
</html>
