<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Editor - GenVoice AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #ffffff; color: #000000; overflow: hidden; }
        .teal-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; background-image: radial-gradient(circle 800px at 0% 10%, rgba(167,243,208, 0.4), transparent 70%), radial-gradient(circle 800px at 100% 90%, rgba(167,243,208, 0.4), transparent 70%); }
        .brutal-card { background: #ffffff; border: 3px solid #000000; box-shadow: 4px 4px 0px #000000; border-radius: 8px; }
        .brutal-btn { background: #ffffff; color: #000; font-weight: 700; border: 3px solid #000; border-radius: 8px; box-shadow: 4px 4px 0px #000; transition: all 0.1s ease; text-transform: uppercase; cursor: pointer; }
        .brutal-btn:active { box-shadow: 0px 0px 0px #000; transform: translate(4px, 4px); }
        .timeline-track { border-top: 3px solid #000; border-bottom: 3px solid #000; background: #e0f7fa; }
        .audio-clip { background: #ffd800; border: 3px solid #000; border-radius: 8px; box-shadow: 2px 2px 0 #000; position: absolute; height: 80%; top: 10%; display: flex; align-items: center; padding: 0 10px; font-weight: bold; font-size: 14px; overflow: hidden; }
        .audio-clip-2 { background: #00e676; }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 12px; height: 12px; border-left: 3px solid #000; background: #fff; }
        ::-webkit-scrollbar-thumb { background: #000; border: 2px solid #fff; }
    </style>
</head>
<body class="h-screen flex flex-col">
    <div class="teal-bg"></div>
    
    <!-- Top Bar -->
    <header class="bg-white border-b-4 border-black h-16 flex items-center justify-between px-4 sticky top-0 z-50">
        <div class="flex items-center space-x-6">
            <button class="brutal-btn p-1.5 rounded-md hover:bg-gray-100 flex items-center justify-center">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </button>
            <h1 class="text-2xl font-extrabold uppercase">Podcast Ep10_Draft01</h1>
            <span class="bg-[#e0f7fa] border-2 border-black px-2 py-0.5 rounded font-bold text-xs">SAVED</span>
        </div>
        <div class="flex items-center space-x-4">
            <button class="brutal-btn bg-white px-6 py-2">EXPORT</button>
            <button class="brutal-btn bg-[#ff4d4d] text-white px-6 py-2">PUBLISH</button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <!-- Sidebar (Script/Blocks) -->
        <aside class="w-96 border-r-4 border-black bg-white flex flex-col h-full z-10">
            <div class="p-4 border-b-3 border-black bg-[#f3e8ff]">
                <h2 class="text-xl font-bold uppercase mb-2">Script Blocks</h2>
                <button class="brutal-btn w-full bg-white py-2 text-sm">+ ADD NEW BLOCK</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- Block 1 -->
                <div class="brutal-card p-3 cursor-grab hover:-translate-y-1 hover:-translate-x-1 hover:shadow-[6px_6px_0_#000] transition-all bg-[#ffd800]">
                    <div class="flex justify-between items-center mb-2 border-b-2 border-black pb-1">
                        <span class="font-bold text-sm">#1 • Mạnh Cường</span>
                        <div class="flex space-x-2">
                            <button class="p-1 border-2 border-black bg-white rounded hover:bg-gray-200">▶</button>
                            <button class="p-1 border-2 border-black bg-white rounded hover:bg-gray-200">⋮</button>
                        </div>
                    </div>
                    <textarea class="w-full bg-transparent border-none resize-none font-medium outline-none" rows="2">Chào mừng các bạn đã quay trở lại với Podcast của GenVoice.</textarea>
                </div>
                <!-- Block 2 -->
                <div class="brutal-card p-3 cursor-grab hover:-translate-y-1 hover:-translate-x-1 hover:shadow-[6px_6px_0_#000] transition-all bg-[#00e676]">
                    <div class="flex justify-between items-center mb-2 border-b-2 border-black pb-1">
                        <span class="font-bold text-sm">#2 • Ngọc Dung</span>
                        <div class="flex space-x-2">
                            <button class="p-1 border-2 border-black bg-white rounded hover:bg-gray-200">▶</button>
                            <button class="p-1 border-2 border-black bg-white rounded hover:bg-gray-200">⋮</button>
                        </div>
                    </div>
                    <textarea class="w-full bg-transparent border-none resize-none font-medium outline-none" rows="3">Trong tập hôm nay, chúng ta sẽ bàn về tương lai của AI trong sản xuất nội dung số.</textarea>
                </div>
            </div>
        </aside>

        <!-- Main Editor (Timeline) -->
        <main class="flex-1 flex flex-col bg-[#f0f0f0]/50 relative">
            <div class="flex-1 relative overflow-auto">
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-10">
                    <h1 class="text-9xl font-black">STUDIO</h1>
                </div>
            </div>

            <!-- Timeline Panel -->
            <div class="h-64 border-t-4 border-black bg-white flex flex-col">
                <div class="h-10 border-b-3 border-black flex items-center px-4 bg-gray-100 font-bold space-x-4">
                    <button class="hover:text-[#ff4d4d]">⏮</button>
                    <button class="text-xl">▶</button>
                    <button class="hover:text-[#ff4d4d]">⏭</button>
                    <span class="font-mono text-sm border-2 border-black px-2 bg-white ml-4">00:01:24</span>
                </div>
                
                <div class="flex-1 relative overflow-x-auto timeline-track">
                    <!-- Playhead -->
                    <div class="absolute top-0 bottom-0 w-1 bg-red-500 z-50 left-[150px]">
                        <div class="w-4 h-4 bg-red-500 border-2 border-black -ml-[6px] -mt-[4px] rotate-45"></div>
                    </div>
                    
                    <!-- Track 1 (Voice) -->
                    <div class="h-16 border-b-2 border-black border-dashed relative w-[200%] px-4 mt-2">
                        <div class="absolute left-0 -ml-2 text-xs font-bold pt-6 text-gray-500">V1</div>
                        <div class="audio-clip w-48 left-[20px]">Block 1 (MC)</div>
                        <div class="audio-clip audio-clip-2 w-64 left-[240px]">Block 2 (ND)</div>
                    </div>
                    
                    <!-- Track 2 (BGM) -->
                    <div class="h-16 relative w-[200%] px-4">
                        <div class="absolute left-0 -ml-2 text-xs font-bold pt-6 text-gray-500">A1</div>
                        <div class="audio-clip bg-gray-200 w-96 left-[20px] text-gray-600 border-dashed">Lofi_Chill_Background.mp3</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="fixed bottom-6 right-6 flex items-center justify-center gap-2">
        <span class="bg-[#00e676] border-2 border-black px-3 py-1 font-bold text-sm shadow-[2px_2px_0_#000]">✓ APPROVED</span>
    </div>
</body>
</html>
