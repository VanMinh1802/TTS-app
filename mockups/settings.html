<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - GenVoice AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #ffffff; color: #000000; }
        .teal-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; background-image: radial-gradient(circle 800px at 0% 10%, rgba(167,243,208, 0.4), transparent 70%), radial-gradient(circle 800px at 100% 90%, rgba(167,243,208, 0.4), transparent 70%); }
        .brutal-card { background: #ffffff; border: 3px solid #000000; border-radius: 12px; box-shadow: 6px 6px 0px #000000; }
        .brutal-btn { background: #ffffff; color: #000; font-weight: 700; border: 3px solid #000; border-radius: 8px; box-shadow: 4px 4px 0px #000; transition: all 0.1s ease; text-transform: uppercase; cursor: pointer; }
        .brutal-btn:active { box-shadow: 0px 0px 0px #000; transform: translate(4px, 4px); }
        .brutal-input { border: 3px solid #000; border-radius: 8px; outline: none; transition: 0.1s; padding: 12px; width: 100%; font-weight: 500; }
        .brutal-input:focus { box-shadow: 4px 4px 0px #000; background: #f8fafc; }
        .nav-item { transition: 0.1s; border: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { border-color: #000; box-shadow: 3px 3px 0 #000; background: #fff; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen">
    <div class="teal-bg"></div>
    
    <nav class="bg-white border-b-4 border-black sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-8">
                <a href="#" class="text-2xl font-extrabold uppercase tracking-tighter bg-black text-white px-3 py-1">GenVoice.</a>
                <div class="hidden md:flex space-x-2">
                    <a href="dashboard.html" class="nav-item px-4 py-2 rounded-lg text-lg">Dashboard</a>
                    <a href="tts-generator.html" class="nav-item px-4 py-2 rounded-lg text-lg">Studio</a>
                    <a href="voice-library.html" class="nav-item px-4 py-2 rounded-lg text-lg">Voices</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-10">
        <h1 class="text-4xl font-extrabold uppercase tracking-tight mb-8">Account Settings</h1>

        <div class="brutal-card p-8 bg-white mb-8">
            <h2 class="text-2xl font-bold uppercase mb-6 border-b-4 border-black pb-2">Profile Information</h2>
            <form class="space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block font-bold mb-2">First Name</label>
                        <input type="text" class="brutal-input" value="Admin">
                    </div>
                    <div>
                        <label class="block font-bold mb-2">Last Name</label>
                        <input type="text" class="brutal-input" value="User">
                    </div>
                </div>
                <div>
                    <label class="block font-bold mb-2">Email Address</label>
                    <input type="email" class="brutal-input bg-gray-100" value="admin@genvoice.ai" readonly>
                </div>
                <button type="button" class="brutal-btn bg-[#ffd800] px-8 py-3">SAVE CHANGES</button>
            </form>
        </div>

        <div class="brutal-card p-8 bg-[#ff4d4d] text-white">
            <h2 class="text-2xl font-bold uppercase mb-2">Danger Zone</h2>
            <p class="font-bold mb-6">Thao tác này không thể hoàn tác. Mọi project và api keys sẽ bị xóa sạch.</p>
            <button class="brutal-btn bg-black text-[#ff4d4d] border-white shadow-[4px_4px_0_#fff] px-8 py-3 w-full sm:w-auto">DELETE ACCOUNT</button>
        </div>

        <div class="mt-8 flex items-center justify-center gap-2">
            <span class="bg-[#00e676] border-2 border-black px-3 py-1 font-bold text-sm shadow-[2px_2px_0_#000]">✓ APPROVED</span>
        </div>
    </main>
</body>
</html>
