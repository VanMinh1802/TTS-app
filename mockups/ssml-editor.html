<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSML Editor - GenVoice AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #ffffff; color: #000000; }
        .teal-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; background-image: radial-gradient(circle 800px at 0% 10%, rgba(167,243,208, 0.4), transparent 70%), radial-gradient(circle 800px at 100% 90%, rgba(167,243,208, 0.4), transparent 70%); }
        .brutal-card { background: #ffffff; border: 4px solid #000000; border-radius: 12px; box-shadow: 6px 6px 0px #000000; }
        .brutal-btn { background: #ffffff; color: #000; font-weight: 700; border: 3px solid #000; border-radius: 8px; box-shadow: 4px 4px 0px #000; transition: all 0.1s ease; text-transform: uppercase; cursor: pointer; }
        .brutal-btn:active { box-shadow: 0px 0px 0px #000; transform: translate(4px, 4px); }
        .brutal-textarea { border: 4px solid #000; border-radius: 8px; outline: none; transition: 0.1s; padding: 16px; width: 100%; font-family: monospace; font-size: 16px; font-weight: 600; background: #fff8e1; }
        .brutal-textarea:focus { box-shadow: 6px 6px 0px #000; }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="teal-bg"></div>
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-extrabold uppercase">⚡ SSML Pro Editor</h1>
            <button class="brutal-btn bg-[#ff4d4d] text-white px-6 py-3 shadow-[6px_6px_0_#000] border-4">BACK TO DASHBOARD</button>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-3">
                <textarea class="brutal-textarea h-[600px] mb-4 shadow-[8px_8px_0_#000]" spellcheck="false">
<speak>
    <voice name="vi-VN-Standard-A">
        <p>Xin chào, đây là hệ thống <emphasis level="strong">GenVoice AI</emphasis>.</p>
        <break time="500ms"/>
        <p>
            Văn bản này đang được đọc thông qua hệ thống thẻ <sub alias="Speech Synthesis Markup Language">SSML</sub>.
        </p>
        <prosody rate="fast" pitch="+2st">
            Đoạn này tôi sẽ đọc nhanh và cao giọng hơn một chút.
        </prosody>
    </voice>
</speak>
                </textarea>
                <div class="flex justify-end">
                    <button class="brutal-btn bg-[#00e676] px-8 py-4 text-xl border-4 shadow-[6px_6px_0_#000]">COMPILE & PLAY</button>
                </div>
            </div>
            
            <div class="space-y-4">
                <h3 class="text-2xl font-bold uppercase border-b-4 border-black pb-2 mb-4">Cheat Code</h3>
                <div class="brutal-card p-4 bg-[#ffd800] border-3 shadow-[4px_4px_0_#000] cursor-pointer hover:-translate-y-1 transition transform">
                    <h4 class="font-bold flex justify-between">Pause <span>&lt;break/&gt;</span></h4>
                    <p class="text-sm mt-2 font-medium">Chèn điểm nghỉ (VD: 500ms, 1s).</p>
                </div>
                <div class="brutal-card p-4 bg-[#e0f7fa] border-3 shadow-[4px_4px_0_#000] cursor-pointer hover:-translate-y-1 transition transform">
                    <h4 class="font-bold flex justify-between">Prosody <span>&lt;prosody&gt;</span></h4>
                    <p class="text-sm mt-2 font-medium">Sửa tốc độ, cao độ cục bộ.</p>
                </div>
                <div class="brutal-card p-4 bg-[#f3e8ff] border-3 shadow-[4px_4px_0_#000] cursor-pointer hover:-translate-y-1 transition transform">
                    <h4 class="font-bold flex justify-between">Alias <span>&lt;sub/&gt;</span></h4>
                    <p class="text-sm mt-2 font-medium">Thay đổi cách phát âm cho từ viết tắt.</p>
                </div>
            </div>
        </div>

        <div class="mt-6 flex items-center justify-center gap-2">
            <span class="bg-[#00e676] border-2 border-black px-3 py-1 font-bold text-sm shadow-[2px_2px_0_#000]">✓ APPROVED</span>
        </div>
    </div>
</body>
</html>
