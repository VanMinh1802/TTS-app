<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS Generator - GenVoice AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #ffffff; color: #000000; }
        .teal-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; background-image: radial-gradient(circle 800px at 0% 10%, rgba(167,243,208, 0.4), transparent 70%), radial-gradient(circle 800px at 100% 90%, rgba(167,243,208, 0.4), transparent 70%); }
        .brutal-card { background: #ffffff; border: 3px solid #000000; border-radius: 12px; box-shadow: 6px 6px 0px #000000; }
        .brutal-btn { background: #ffffff; color: #000; font-weight: 700; border: 3px solid #000; border-radius: 8px; box-shadow: 4px 4px 0px #000; transition: all 0.1s ease; text-transform: uppercase; cursor: pointer; }
        .brutal-btn:active { box-shadow: 0px 0px 0px #000; transform: translate(4px, 4px); }
        .btn-primary { background: #00e676; }
        .brutal-input, .brutal-textarea { border: 3px solid #000; border-radius: 8px; outline: none; transition: 0.1s; padding: 12px; width: 100%; font-weight: 500; }
        .brutal-input:focus, .brutal-textarea:focus { box-shadow: 4px 4px 0px #000; background: #f8fafc; }
        .nav-item { transition: 0.1s; border: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { border-color: #000; box-shadow: 3px 3px 0 #000; background: #fff; font-weight: bold; }
        /* Cần thanh trượt brutal */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #ffd800; cursor: pointer; border: 3px solid #000; box-shadow: 2px 2px 0 #000; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #000; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen">
    <div class="teal-bg"></div>
    
    <nav class="bg-white border-b-4 border-black sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-8">
                <a href="#" class="text-2xl font-extrabold uppercase tracking-tighter bg-black text-white px-3 py-1">GenVoice.</a>
                <div class="hidden md:flex space-x-2">
                    <a href="dashboard.html" class="nav-item px-4 py-2 rounded-lg text-lg">Dashboard</a>
                    <a href="tts-generator.html" class="nav-item active px-4 py-2 rounded-lg text-lg">Studio</a>
                    <a href="voice-library.html" class="nav-item px-4 py-2 rounded-lg text-lg">Voices</a>
                    <a href="api-keys.html" class="nav-item px-4 py-2 rounded-lg text-lg">API</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8">
        
        <!-- Left Panel: Content -->
        <div class="flex-1 flex flex-col">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h1 class="text-4xl font-extrabold uppercase tracking-tight">TTS Studio</h1>
                    <p class="font-bold text-gray-600 border-b-3 border-black inline-block mt-2">Dán văn bản và tạo giọng nói tức thì.</p>
                </div>
                <button class="brutal-btn btn-primary px-8 py-4 text-xl shadow-[6px_6px_0_#000]">
                    GENERATE AUDIO
                </button>
            </div>

            <div class="brutal-card flex-1 flex flex-col p-4 bg-white relative">
                <div class="flex justify-between items-center mb-4 pb-4 border-b-3 border-black">
                    <div class="flex items-center space-x-4 font-bold">
                        <button class="hover:underline">Clear Text</button>
                        <button class="hover:underline">Add Pauses</button>
                    </div>
                    <span class="bg-[#ffd800] border-2 border-black px-3 py-1 font-bold shadow-[2px_2px_0_#000] rotate-1">1,250 chars</span>
                </div>
                <textarea class="brutal-textarea flex-1 resize-none border-none shadow-none text-lg leading-relaxed focus:bg-white focus:shadow-none" placeholder="Xin chào, hãy gõ nội dung bạn muốn GenVoice AI đọc tại đây..."></textarea>
            </div>
            
            <!-- Player Area -->
            <div class="brutal-card mt-6 p-6 bg-[#f3e8ff] flex items-center space-x-6">
                <button class="brutal-btn w-16 h-16 rounded-full flex items-center justify-center bg-white shadow-[4px_4px_0_#000] hover:bg-[#ffd800]">
                    <svg class="w-8 h-8 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <div class="flex-1">
                    <div class="flex justify-between font-bold mb-2">
                        <span>00:00</span>
                        <span>01:45</span>
                    </div>
                    <div class="w-full h-4 border-2 border-black rounded bg-white relative">
                        <div class="absolute top-0 left-0 h-full bg-[#00e676] border-r-2 border-black w-1/3"></div>
                    </div>
                </div>
                <button class="brutal-btn p-3 bg-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                </button>
            </div>
        </div>

        <!-- Right Panel: Configurations -->
        <div class="w-full lg:w-96 space-y-6">
            <div class="brutal-card p-6 bg-[#ffd800]">
                <h3 class="text-2xl font-bold uppercase mb-4 border-b-4 border-black pb-2">VOICE SETTINGS</h3>
                
                <div class="space-y-6">
                    <div>
                        <label class="block font-bold mb-2">Select Voice</label>
                        <select class="brutal-input bg-white appearance-none cursor-pointer">
                            <option>👨🏻‍🦱 Mạnh Cường - Tiêu chuẩn</option>
                            <option>👩🏻‍🦰 Ngọc Dung - Cảm xúc</option>
                            <option>👨🏽‍🦳 Trọng Luân - Kể chuyện</option>
                        </select>
                    </div>

                    <div class="p-4 border-3 border-black bg-white shadow-[4px_4px_0_#000]">
                        <label class="flex justify-between font-bold mb-4">
                            <span>Speed</span>
                            <span class="bg-[#00e676] px-2 border-2 border-black">1.0x</span>
                        </label>
                        <input type="range" min="0.5" max="2" step="0.1" value="1" class="w-full">
                    </div>

                    <div class="p-4 border-3 border-black bg-white shadow-[4px_4px_0_#000]">
                        <label class="flex justify-between font-bold mb-4">
                            <span>Pitch</span>
                            <span class="bg-[#e0f7fa] px-2 border-2 border-black">Default</span>
                        </label>
                        <input type="range" min="-10" max="10" step="1" value="0" class="w-full">
                    </div>
                </div>
            </div>

            <div class="brutal-card p-6 bg-[#e0f7fa]">
                <h3 class="text-xl font-bold uppercase mb-2">Export Options</h3>
                <div class="flex space-x-4 mt-4">
                    <button class="brutal-btn bg-white flex-1 py-3 border-2">MP3</button>
                    <button class="brutal-btn bg-white flex-1 py-3 border-2">WAV</button>
                </div>
            </div>
        </div>

        <div class="mt-8 flex items-center justify-center gap-2">
            <span class="bg-[#00e676] border-2 border-black px-3 py-1 font-bold text-sm shadow-[2px_2px_0_#000]">✓ APPROVED</span>
        </div>
    </main>
</body>
</html>
