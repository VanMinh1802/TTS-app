<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GenVoice AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #ffffff; color: #000000; }
        .teal-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; background-image: radial-gradient(circle 800px at 0% 10%, rgba(167,243,208, 0.6), transparent 70%), radial-gradient(circle 800px at 100% 90%, rgba(167,243,208, 0.6), transparent 70%); }
        .brutal-card { background: #ffffff; border: 4px solid #000000; border-radius: 16px; box-shadow: 8px 8px 0px #000000; }
        .brutal-btn { background: #ffd800; color: #000; font-weight: 800; border: 3px solid #000; border-radius: 12px; box-shadow: 4px 4px 0px #000; transition: all 0.1s ease; text-transform: uppercase; cursor: pointer; }
        .brutal-btn:active { box-shadow: 0px 0px 0px #000; transform: translate(4px, 4px); }
        .brutal-input { width: 100%; padding: 12px 16px; background: #fff; border: 3px solid #000; border-radius: 8px; outline: none; font-weight: 500; transition: 0.1s; }
        .brutal-input:focus { box-shadow: 4px 4px 0px #000; background: #f8fafc; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="teal-bg"></div>
    
    <div class="w-full max-w-md brutal-card p-8 md:p-10 relative">
        <div class="absolute -top-6 -right-6 bg-[#00e676] text-black border-3 border-black font-bold px-4 py-1 rounded-full shadow-[4px_4px_0_#000] rotate-12">
            STABLE v3
        </div>

        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold uppercase tracking-tighter mb-2">GenVoice.</h1>
            <p class="text-gray-600 font-medium border-b-4 border-black pb-4 inline-block">Welcome back to the Studio</p>
        </div>

        <form class="space-y-6">
            <div class="space-y-2 text-left">
                <label class="block font-bold text-lg">Email Address</label>
                <input type="email" class="brutal-input placeholder-gray-400" placeholder="admin@genvoice.ai">
            </div>

            <div class="space-y-2 text-left">
                <div class="flex justify-between items-end">
                    <label class="block font-bold text-lg">Password</label>
                    <a href="#" class="text-sm font-bold text-gray-500 hover:text-black underline">Forgot?</a>
                </div>
                <input type="password" class="brutal-input placeholder-gray-400" placeholder="••••••••">
            </div>

            <button type="button" class="brutal-btn w-full py-4 text-xl mt-4">
                Login
            </button>
        </form>

        <div class="mt-8 text-center border-t-4 border-black pt-6">
            <p class="font-medium text-gray-600 mb-4">OR CONTINUE WITH</p>
            <button class="w-full bg-white border-3 border-black py-3 rounded-xl font-bold box-shadow-[3px_3px_0_#000] hover:bg-gray-50 transition-all flex items-center justify-center space-x-2">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                <span>Google</span>
            </button>
        </div>

        <p class="text-center mt-6 font-medium">
            New here? <a href="register.html" class="text-black underline font-bold decoration-2">Create an account</a>
        </p>

        <div class="mt-6 flex items-center justify-center gap-2">
            <span class="bg-[#00e676] border-2 border-black px-3 py-1 font-bold text-sm shadow-[2px_2px_0_#000]">✓ APPROVED</span>
        </div>
    </div>
</body>
</html>
